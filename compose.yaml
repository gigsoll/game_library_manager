services:
    traefik:
        image: traefik:v3.6
        ports:
            - 80:80
            - 443:443
            - 8080:8080
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - ./traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro
            - ./certs/:/certs:ro
            - ./traefik/dynamic:/dynamic:ro
        restart: unless-stopped

    db:
        image: postgres:18
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres:/var/lib/postgresql/
        ports:
            - 5432:5432
        healthcheck:
            test: ["CMD-SHELL", "pg_isready"]
            interval: 10s
            timeout: 5s
            retries: 5

    backend:
        build: .
        env_file:
            - .env
        depends_on:
            db:
                condition: service_healthy
        labels:
            - "traefik.enable=true"

            # /* -> localhost:8000
            - "traefik.http.routers.backend-main.rule=Host(`localhost`)"
            - "traefik.http.routers.backend-main.entrypoints=web"
            - "traefik.http.routers.backend-main.service=backend-svc"
            - "traefik.http.routers.backend-main.priority=1"

            # api.localhost -> localhost:8000/api
            - "traefik.http.routers.backend-api.rule=Host(`api.localhost`)"
            - "traefik.http.routers.backend-api.entrypoints=web"
            - "traefik.http.routers.backend-api.service=backend-svc"
            - "traefik.http.routers.backend-api.priority=2"

            - "traefik.http.services.backend-svc.loadbalancer.server.port=8000"
        develop:
            watch:
                - path: ./game_library_manager/
                  action: rebuild

volumes:
    postgres:
